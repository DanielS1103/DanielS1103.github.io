<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Portafolio</title>
    <meta
      name="description"
      content="Un pequeño mundo pixel-art con un pato de sombrero de copa, explorable con las flechas o WASD."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #1b1f2e;
        --bg-deep-2: #262c46;
        --panel-wood: #3d2b1f;
        --panel-wood-lt: #5a4130;
        --accent-amber: #d99a3d;
        --accent-amber-dk: #b57a28;
        --accent-blue: #5c80b8;
        --text-parchment: #e8dcc8;
        --text-dim: #a89880;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }
      body {
        background: radial-gradient(
          ellipse at 50% -10%,
          var(--bg-deep-2) 0%,
          var(--bg-deep) 60%
        );
        color: var(--text-parchment);
        font-family: "VT323", monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 36px 16px 48px;
      }
      .stage {
        width: 100%;
        max-width: 680px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .title {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(17px, 5vw, 28px);
        color: var(--accent-amber);
        text-shadow: 3px 3px 0 var(--panel-wood);
        margin: 0 0 8px;
        letter-spacing: 1px;
        line-height: 1.4;
      }
      .subtitle {
        font-size: 21px;
        color: var(--text-dim);
        margin: 0 0 24px;
        letter-spacing: 0.5px;
      }
      .frame {
        display: inline-block;
        padding: 5px;
        background: var(--accent-amber);
        box-shadow:
          0 0 0 5px var(--bg-deep),
          0 0 0 9px var(--accent-amber-dk),
          0 18px 40px rgba(0, 0, 0, 0.55);
        margin-bottom: 24px;
        line-height: 0;
      }
      canvas#game {
        display: block;
        width: min(640px, 86vw);
        height: auto;
        aspect-ratio: 4/3;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #4a7fc9;
      }
      .hud {
        background: var(--panel-wood);
        border: 3px solid var(--panel-wood-lt);
        padding: 12px 22px;
        max-width: 520px;
        width: 100%;
      }
      .hint {
        margin: 0;
        font-size: 22px;
        color: var(--text-parchment);
      }
      .cursor {
        color: var(--accent-amber);
        display: inline-block;
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      .dpad {
        display: none;
        grid-template-columns: repeat(3, 54px);
        grid-template-rows: repeat(3, 54px);
        gap: 4px;
        margin-top: 22px;
      }
      .dpad button {
        font-family: "Press Start 2P", monospace;
        font-size: 16px;
        color: var(--text-parchment);
        background: var(--panel-wood);
        border: 3px solid var(--panel-wood-lt);
        cursor: pointer;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      .dpad button:active {
        background: var(--accent-amber-dk);
      }
      .dpad .up {
        grid-column: 2;
        grid-row: 1;
      }
      .dpad .left {
        grid-column: 1;
        grid-row: 2;
      }
      .dpad .right {
        grid-column: 3;
        grid-row: 2;
      }
      .dpad .down {
        grid-column: 2;
        grid-row: 3;
      }
      @media (hover: none) and (pointer: coarse) {
        .dpad {
          display: grid;
        }
      }
      .credits {
        margin-top: 26px;
        font-size: 16px;
        color: var(--text-dim);
      }
      .credits a {
        color: var(--accent-blue);
      }
      @media (prefers-reduced-motion: reduce) {
        .cursor {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <h1 class="title">Portafolio</h1>
      <p class="subtitle">.</p>

      <div class="frame">
        <canvas
          id="game"
          width="320"
          height="240"
          role="img"
          aria-label="Mundo de exploración en pixel art con un pato de sombrero de copa que se puede mover"
        ></canvas>
      </div>

      <div class="hud">
        <p class="hint">
          <span class="cursor">▶</span> Usa las flechas o WASD para moverte
        </p>
      </div>

      <div class="dpad">
        <button class="up" data-dir="up" aria-label="Arriba">▲</button>
        <button class="left" data-dir="left" aria-label="Izquierda">◀</button>
        <button class="right" data-dir="right" aria-label="Derecha">▶</button>
        <button class="down" data-dir="down" aria-label="Abajo">▼</button>
      </div>
    </main>

    <script>
      (function () {

            ],
            left_b: [

              [10, 17, 6, 4, "#d99a1a"],

              [2, 20, 15, 2, "#e0b431"],
              [10, 22, 4, 2, "#171512"],

            ],
          },
          tiles: {
            grass1: [
              [0, 0, 16, 16, "#5a9c4a"],

            ],

            ],

            ],

              [9, 3, 6, 1, "#7ab0e8"],
              [1, 9, 6, 1, "#7ab0e8"],
              [9, 9, 6, 1, "#7ab0e8"],
              [4, 6, 7, 1, "#3a63a3"],
              [4, 13, 7, 1, "#3a63a3"],
            ],
            flower: [
              [0, 0, 16, 16, "#5a9c4a"],
              [2, 10, 2, 1, "#4a8a3a"],
              [12, 4, 2, 1, "#4a8a3a"],
              [3, 3, 1, 1, "#3f7a3a"],
              [3, 2, 1, 1, "#d9534f"],
              [11, 7, 1, 1, "#3f7a3a"],
              [11, 6, 1, 1, "#e8c34a"],
              [6, 12, 1, 1, "#3f7a3a"],
              [6, 11, 1, 1, "#f5f0e6"],
              [13, 13, 1, 1, "#3f7a3a"],
              [13, 12, 1, 1, "#d9534f"],
            ],
          },
          tree: [
            [6, 0, 4, 1, "#4a8a3a"],
            [4, 1, 8, 2, "#2e6b3e"],
            [2, 3, 12, 4, "#2e6b3e"],
            [2, 7, 12, 3, "#2e6b3e"],
            [3, 2, 4, 3, "#3e8a52"],
            [9, 4, 3, 3, "#20502c"],
            [2, 8, 3, 2, "#20502c"],
            [7, 15, 2, 6, "#5a3d24"],
            [6, 20, 4, 2, "#432c19"],
          ],
        };

        const TILE = 16;
        const VIEW_W = 20,
          VIEW_H = 15;
        const CANVAS_W = TILE * VIEW_W,
          CANVAS_H = TILE * VIEW_H;
        const MAP_W = 32,
          MAP_H = 22;

        function mulberry32(seed) {
          return function () {
            seed |= 0;
            seed = (seed + 0x6d2b79f5) | 0;
            let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rand = mulberry32(1337);

        function rectsToGrid(rects, w, h) {
          const grid = [];
          for (let y = 0; y < h; y++) grid.push(new Array(w).fill(null));
          for (const rect of rects) {
            const x = rect[0],
              y = rect[1],
              rw = rect[2],
              rh = rect[3],
              color = rect[4];
            for (let yy = y; yy < y + rh; yy++) {
              for (let xx = x; xx < x + rw; xx++) {
                if (xx >= 0 && xx < w && yy >= 0 && yy < h)
                  grid[yy][xx] = color;
              }
            }
          }
          return grid;
        }

        function autoOutline(grid, outlineColor) {
          const h = grid.length,
            w = grid[0].length;
          const out = grid.map((row) => row.slice());
          const nb = [
            [1, 0],
            [-1, 0],
            [0, 1],
            [0, -1],
          ];
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              if (grid[y][x] === null) {
                for (const d of nb) {
                  const nx = x + d[0],
                    ny = y + d[1];
                  if (
                    nx >= 0 &&
                    nx < w &&
                    ny >= 0 &&
                    ny < h &&
                    grid[ny][nx] !== null
                  ) {
                    out[y][x] = outlineColor;
                    break;
                  }
                }
              }
            }
          }
          return out;
        }

        function gridToCanvas(grid) {
          const h = grid.length,
            w = grid[0].length;
          const c = document.createElement("canvas");
          c.width = w;
          c.height = h;
          const cctx = c.getContext("2d");
          const img = cctx.createImageData(w, h);
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              const col = grid[y][x];
              if (col) {
                const i = (y * w + x) * 4;
                img.data[i] = parseInt(col.slice(1, 3), 16);
                img.data[i + 1] = parseInt(col.slice(3, 5), 16);
                img.data[i + 2] = parseInt(col.slice(5, 7), 16);
                img.data[i + 3] = 255;
              }
            }
          }
          cctx.putImageData(img, 0, 0);
          return c;
        }

        function mirrorCanvas(src) {
          const m = document.createElement("canvas");
          m.width = src.width;
          m.height = src.height;
          const mctx = m.getContext("2d");
          mctx.imageSmoothingEnabled = false;
          mctx.translate(src.width, 0);
          mctx.scale(-1, 1);
          mctx.drawImage(src, 0, 0);
          return m;
        }

        const OUTLINE = ART.palette.outline;

        const charSprites = {};
        for (const name in ART.charFrames) {
          charSprites[name] = gridToCanvas(
            autoOutline(rectsToGrid(ART.charFrames[name], 20, 24), OUTLINE),
          );
        }
        charSprites.left_a = mirrorCanvas(charSprites.right_a);
        charSprites.left_b = mirrorCanvas(charSprites.right_b);

        const tileSprites = {};
        for (const name in ART.tiles) {
          tileSprites[name] = gridToCanvas(
            rectsToGrid(ART.tiles[name], 16, 16),
          );
        }
        const treeSprite = gridToCanvas(
          autoOutline(rectsToGrid(ART.tree, 16, 24), OUTLINE),
        );

        /* ---------------- map generation (deterministic) ---------------- */
        const mapGrid = [];
        const solidGrid = [];
        const decorations = [];

        for (let y = 0; y < MAP_H; y++) {
          const row = [],
            srow = [];
          for (let x = 0; x < MAP_W; x++) {
            row.push(rand() < 0.55 ? "grass1" : "grass2");
            srow.push(false);
          }
          mapGrid.push(row);
          solidGrid.push(srow);
        }

        function placeTree(x, y) {
          if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return;
          if (solidGrid[y][x]) return;
          solidGrid[y][x] = true;
          decorations.push({ x: x, y: y });
        }

        for (let x = 0; x < MAP_W; x++) {
          placeTree(x, 0);
          placeTree(x, MAP_H - 1);
        }
        for (let y = 0; y < MAP_H; y++) {
          placeTree(0, y);
          placeTree(MAP_W - 1, y);
        }

        let py = Math.floor(MAP_H / 2);
        for (let x = 1; x < MAP_W - 1; x++) {
          if (rand() < 0.28) py += rand() < 0.5 ? -1 : 1;
          py = Math.max(3, Math.min(MAP_H - 4, py));
          mapGrid[py][x] = "path";
          if (rand() < 0.5) mapGrid[Math.min(MAP_H - 2, py + 1)][x] = "path";
        }

        const pcx = Math.floor(MAP_W * 0.68),
          pcy = Math.floor(MAP_H * 0.32),
          pr = 3;
        for (let y = pcy - pr; y <= pcy + pr; y++) {
          for (let x = pcx - pr; x <= pcx + pr; x++) {
            if (x < 1 || x >= MAP_W - 1 || y < 1 || y >= MAP_H - 1) continue;
            const dx = x - pcx,
              dy = y - pcy;
            if (
              dx * dx * 1.4 + dy * dy <= pr * pr &&
              mapGrid[y][x] !== "path"
            ) {
              mapGrid[y][x] = "water";
              solidGrid[y][x] = true;
            }
          }
        }

        for (let i = 0; i < 7; i++) {
          const cx = 2 + Math.floor(rand() * (MAP_W - 4));
          const cy = 2 + Math.floor(rand() * (MAP_H - 4));
          for (let k = 0; k < 4; k++) {
            const x = cx + Math.floor(rand() * 3) - 1,
              y = cy + Math.floor(rand() * 3) - 1;
            if (
              x > 0 &&
              x < MAP_W - 1 &&
              y > 0 &&
              y < MAP_H - 1 &&
              !solidGrid[y][x] &&
              mapGrid[y][x] !== "water" &&
              mapGrid[y][x] !== "path"
            ) {
              mapGrid[y][x] = "flower";
            }
          }
        }

        let placed = 0,
          tries = 0;
        while (placed < 16 && tries < 600) {
          tries++;
          const x = 2 + Math.floor(rand() * (MAP_W - 4));
          const y = 2 + Math.floor(rand() * (MAP_H - 4));
          if (Math.abs(x - 3) + Math.abs(y - Math.floor(MAP_H / 2)) < 3)
            continue;
          if (
            !solidGrid[y][x] &&
            mapGrid[y][x] !== "water" &&
            mapGrid[y][x] !== "path" &&
            mapGrid[y][x] !== "flower"
          ) {
            placeTree(x, y);
            placed++;
          }
        }

        /* ---------------- player ---------------- */
        const player = {
          x: 3 * TILE + 8,
          y: Math.floor(MAP_H / 2) * TILE + 8,
          dir: "down",
          frame: 0,
          moving: false,
          animTimer: 0,
          speed: 78,
        };

        function isSolid(px, py) {
          const tx = Math.floor(px / TILE),
            ty = Math.floor(py / TILE);
          if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return true;
          return solidGrid[ty][tx];
        }
        function collidesBox(cx, cy) {
          const halfW = 6,
            top = cy - 3,
            bottom = cy + 4;
          return (
            isSolid(cx - halfW, top) ||
            isSolid(cx + halfW - 1, top) ||
            isSolid(cx - halfW, bottom) ||
            isSolid(cx + halfW - 1, bottom)
          );
        }

        /* ---------------- input ---------------- */
        const keys = {};
        const KEYMAP = {
          arrowup: "up",
          arrowdown: "down",
          arrowleft: "left",
          arrowright: "right",
          w: "up",
          s: "down",
          a: "left",
          d: "right",
        };
        window.addEventListener("keydown", function (e) {
          const k = e.key.toLowerCase();
          if (KEYMAP[k]) {
            keys[KEYMAP[k]] = true;
            e.preventDefault();
          }
        });
        window.addEventListener("keyup", function (e) {
          const k = e.key.toLowerCase();
          if (KEYMAP[k]) {
            keys[KEYMAP[k]] = false;
          }
        });
        window.addEventListener("blur", function () {
          for (const k in keys) keys[k] = false;
        });

        document.querySelectorAll(".dpad button").forEach(function (btn) {
          const dir = btn.dataset.dir;
          const on = function (ev) {
            ev.preventDefault();
            keys[dir] = true;
          };
          const off = function (ev) {
            ev.preventDefault();
            keys[dir] = false;
          };
          btn.addEventListener("pointerdown", on);
          btn.addEventListener("pointerup", off);
          btn.addEventListener("pointerleave", off);
          btn.addEventListener("pointercancel", off);
        });

        /* ---------------- update / draw ---------------- */
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = false;

        function update(dt) {
          let dx = 0,
            dy = 0;
          if (keys.left) dx -= 1;
          if (keys.right) dx += 1;
          if (keys.up) dy -= 1;
          if (keys.down) dy += 1;

          player.moving = dx !== 0 || dy !== 0;
          if (dx !== 0 && dy !== 0) {
            dx *= 0.7071;
            dy *= 0.7071;
          }

          if (dy < 0) player.dir = "up";
          else if (dy > 0) player.dir = "down";
          else if (dx < 0) player.dir = "left";
          else if (dx > 0) player.dir = "right";

          const nx = player.x + dx * player.speed * dt;
          const ny = player.y + dy * player.speed * dt;
          if (!collidesBox(nx, player.y)) player.x = nx;
          if (!collidesBox(player.x, ny)) player.y = ny;

          player.x = Math.max(TILE, Math.min(MAP_W * TILE - TILE, player.x));
          player.y = Math.max(TILE, Math.min(MAP_H * TILE - TILE, player.y));

          if (player.moving) {
            player.animTimer += dt;
            if (player.animTimer > 0.16) {
              player.animTimer = 0;
              player.frame = player.frame === 0 ? 1 : 0;
            }
          } else {
            player.frame = 0;
            player.animTimer = 0;
          }
        }

        function currentPlayerSprite() {
          const suffix = player.moving && player.frame === 1 ? "b" : "a";
          return charSprites[player.dir + "_" + suffix];
        }

        function draw() {
          let camX = player.x - CANVAS_W / 2;
          let camY = player.y - CANVAS_H / 2;
          camX = Math.max(0, Math.min(MAP_W * TILE - CANVAS_W, camX));
          camY = Math.max(0, Math.min(MAP_H * TILE - CANVAS_H, camY));
          camX = Math.round(camX);
          camY = Math.round(camY);

          ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

          const startTX = Math.max(0, Math.floor(camX / TILE));
          const endTX = Math.min(MAP_W, Math.ceil((camX + CANVAS_W) / TILE));
          const startTY = Math.max(0, Math.floor(camY / TILE));
          const endTY = Math.min(MAP_H, Math.ceil((camY + CANVAS_H) / TILE));

          for (let ty = startTY; ty < endTY; ty++) {
            for (let tx = startTX; tx < endTX; tx++) {
              ctx.drawImage(
                tileSprites[mapGrid[ty][tx]],
                tx * TILE - camX,
                ty * TILE - camY,
              );
            }
          }

          const drawables = decorations
            .filter(function (d) {
              return (
                d.x >= startTX - 2 &&
                d.x < endTX + 2 &&
                d.y >= startTY - 3 &&
                d.y < endTY + 2
              );
            })
            .map(function (d) {
              return { type: "tree", x: d.x, y: d.y, sortY: (d.y + 1) * TILE };
            });
          drawables.push({ type: "player", sortY: player.y });
          drawables.sort(function (a, b) {
            return a.sortY - b.sortY;
          });

          for (const d of drawables) {
            if (d.type === "tree") {
              ctx.drawImage(
                treeSprite,
                d.x * TILE - camX,
                (d.y + 1) * TILE - camY - 24,
              );
            } else {
              const spr = currentPlayerSprite();
              const dx = Math.round(player.x - camX - spr.width / 2);
              const dy = Math.round(player.y - camY - spr.height + 3);
              ctx.drawImage(spr, dx, dy);
            }
          }
        }

        let lastTs = 0;
        function loop(ts) {
          if (!lastTs) lastTs = ts;
          let dt = (ts - lastTs) / 1000;
          lastTs = ts;
          dt = Math.min(dt, 0.05);
          update(dt);
          draw();
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
